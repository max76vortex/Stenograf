# n8n reverse proxy для n8n.maxvortex.ru
# Проксирует на Docker-контейнер n8n (порт 5678)

upstream n8n {
    server 127.0.0.1:5678;
    keepalive 64;
}

server {
    listen 109.172.101.24:80;
    server_name n8n.maxvortex.ru www.n8n.maxvortex.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 109.172.101.24:443 ssl;
    http2 on;
    server_name n8n.maxvortex.ru www.n8n.maxvortex.ru;

    access_log /var/www/httpd-logs/n8n.maxvortex.ru.access.log;
    error_log  /var/www/httpd-logs/n8n.maxvortex.ru.error.log warn;

    ssl_certificate /var/www/httpd-cert/maxvortex_ru.crt;
    ssl_certificate_key /var/www/httpd-cert/maxvortex_ru.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://n8n;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 60;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;
    }
}
